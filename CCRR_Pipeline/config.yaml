# CCRI Pipeline Configuration
# All paths are relative to the repository root.

# ── Pipeline options ──────────────────────────────────────────────────────────
options:
  include_sids: True   # Set to false to exclude all SIDS countries from processing

# SIDS ISO3 codes (Small Island Developing States – Countries of High/Special Concern)
# LLDC ISO3 codes (Landlocked Developing Countries – UN official list)
lldc_iso3:
  - AFG   # Afghanistan
  - ARM   # Armenia
  - AZE   # Azerbaijan
  - BTN   # Bhutan
  - BOL   # Bolivia
  - BWA   # Botswana
