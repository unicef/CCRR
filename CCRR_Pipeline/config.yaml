  p1_p2_avg_geojson:         misc/p1_p2_avg_ccri.geojson

  # Final outputs
  quadrant_csv:              misc/ccri_quadrant_table.csv
  ccri_format_geojson:       misc/CCRR_output.geojson


# ── Pillar 1 processing ───────────────────────────────────────────────────────
pillar1:
  normalization_range: [1, 10]          # MinMaxScaler range for P1 indicators
  absolute_log_threshold: 100           # Values <= this are floored to 0.1 before log10
  absolute_log_floor: 0.1

  # Hazards whose NaN child exposure should be treated as 0
  zero_fill_cols:
    - pop_exposed_agricultural_drought_fao_1984-2023
    - pop_exposed_tropical_storm_100yr_giri_2024
    - pop_exposed_vectorborne_malariapf_2012-2022
    - pop_exposed_vectorborne_malariapv_2012-2022
    - pop_exposed_sand_dust_storm_unccd_2024
    #- pop_exposed_air_pollution_pm25_1998-2023
    #- pop_exposed_fire_FRP_nasa_2001-2024
    #- pop_exposed_fire_frequency_nasa_2001-2023
    - pop_exposed_river_flood_100yr_jrc_2024
    - pop_exposed_coastal_flood_100yr_jrc_2024
    # - pop_exposed_drought_spei_terraclimate_1958-2025
    # - pop_exposed_drought_spi_terraclimate_1958-2025
  

  # Manual overrides: force specific hazard columns to null for given countries.
  # Use the normalized column name (e.g. river_flood_absolute, fire_FRP_relative).
  # Also nulls the corresponding raw abs/rel columns in the final output.
  force_null:
    FJI:
      - river_flood_absolute
      - river_flood_relative
    MHL:
      - fire_FRP_absolute
      - fire_FRP_relative
      - fire_frequency_absolute
      - fire_frequency_relative
    WSM:
      - coastal_flood_absolute
      - coastal_flood_relative
    TON:
      - coastal_flood_absolute
      - coastal_flood_relative
    TUV:
      - coastal_flood_absolute
      - coastal_flood_relative
      - fire_FRP_absolute
      - fire_FRP_relative
      - fire_frequency_absolute
      - fire_frequency_relative
    CPV:
      - coastal_flood_absolute
      - coastal_flood_relative
    MDV:
      - coastal_flood_absolute
      - coastal_flood_relative
      - fire_FRP_absolute
      - fire_FRP_relative
      - fire_frequency_absolute
      - fire_frequency_relative
    MUS:
      - coastal_flood_absolute
      - coastal_flood_relative
    NRU:
      - coastal_flood_absolute
      - coastal_flood_relative
      - fire_FRP_absolute
      - fire_FRP_relative
      - fire_frequency_absolute
      - fire_frequency_relative
      - air_pollution_absolute
      - air_pollution_relative
    SYC:
      - coastal_flood_absolute
      - coastal_flood_relative
    LIE:
      - fire_FRP_absolute
      - fire_FRP_relative
      - fire_frequency_absolute
      - fire_frequency_relative
    MCO:
      - air_pollution_absolute
      - air_pollution_relative

  # Hazard groups for geometric-mean aggregation (P1 score)
  hazard_groups:
    river_flood:   [river_flood]
    coastal_flood: [coastal_flood]
    storm:         [tropical_storm]
    drought:       [agricultural_drought, drought_spei, drought_spi]
    heatwave:      [heatwave_frequency, heatwave_duration, heatwave_severity]
    extreme_heat:  [extreme_heat]
    fire:          [fire_FRP, fire_frequency]
    sand_dust:     [sand_dust]
    air_pollution: [air_pollution]
    malaria:       [vectorborne_malariapv, vectorborne_malariapf]

  # Final P1 score scaling (applied after group geometric means)
  p1_score_range: [0, 10]


# ── Pillar 2 processing ───────────────────────────────────────────────────────
pillar2:
  normalization_range: [0, 10]          # MinMaxScaler range for P2 indicators
  time_period_min: 2015                 # Earliest year of data to include
  coverage_threshold: 0.4              # Min fraction of non-missing P2 indicators per country

  # Indicators where higher raw value = better outcome → reversed after normalization
  reverse_columns:
    - P2_Skilled_birth_coverage
    - P2_Lower_secondary_completion_rate
    - P2_DTP1_access
    - P2_DTP3_access
    - P2_At-least_basic_drinking_water
    - P2_At-least_basic_sanitation
    - P2_Basic_hygiene
    - P2_electricity_access
    - P2_Under_five_covered_by_social_protection

  # Domain groupings for the arithmetic average
  domains:
    health:     [P2_DTP1_access, P2_DTP3_access, P2_Skilled_birth_coverage, P2_electricity_access]
    nutrition:  [P2_Stunting, P2_Child_Food_Poverty]
    wash:       [P2_At-least_basic_drinking_water, P2_At-least_basic_sanitation, P2_Basic_hygiene]
    education:  [P2_Lower_secondary_out_of_school, P2_Lower_secondary_completion_rate, P2_Learning_poverty]
    protection: [P2_Child_labor, P2_Child_marriage]
    poverty:    [P2_Child_poverty, P2_Under_five_covered_by_social_protection]
    survival:   [P2_Under_five_mortality]


# ── CCRI formatting ───────────────────────────────────────────────────────────
formatting:
  # Countries to exclude from the final output (rows retained, all data columns nulled)
  exclude_iso3: [PSE, NIC, VAT]

  # Countries where P1 overall score is forced null (individual hazard scores kept)
  force_null_p1: []

  # Countries where P2 overall score is forced null (individual P2 indicators kept)
  force_null_p2_overall: [GRD, PLW, ATG]

  # Exposure columns whose absolute values are capped at u18_pop
  mhi_abs_cols:
    - mhi_TH75_abs
    - mhi_TH80_abs
    - mhi_TH85_abs
    - mhi_TH90_abs
    - mhi_TH95_abs
    - mhc_ge1_abs
    - mhc_ge2_abs
    - mhc_ge3_abs
    - mhc_ge4_abs
    - mhc_ge5_abs
    - mhc_ge6_abs
    - mhc_ge7_abs
    - mhc_ge8_abs

  # P1 hazard column abbreviation map (applied to both abs/rel/norm variants)
  p1_col_renames:
    river_flood:            rfl
    coastal_flood:          cfl
    tropical_storm:         ts
    agricultural_drought:   agdr
    drought_spei:           metdr_spei
    drought_spi:            metdr_spi
    heatwave_frequency:     hw_fre
    heatwave_severity:      hw_sev
    heatwave_duration:      hw_dur
    extreme_heat:           ext
    fire_frequency:         fr_fre
    fire_FRP:               fr_int
    sand_dust:              sds
    vectorborne_malariapv:  mal_pv
    vectorborne_malariapf:  mal_pf
    air_pollution:          pm25

  # P2 indicator column abbreviation map
  p2_col_renames:
    P2_DTP1_access:                          hea_dtp1
    P2_DTP3_access:                          hea_dtp3
    P2_Skilled_birth_coverage:               hea_skat
    P2_electricity_access:                   hea_elec
    P2_Stunting:                             nut_stu
    P2_Child_Food_Poverty:                   nut_fpov
    P2_At-least_basic_drinking_water:        wash_wat
    P2_At-least_basic_sanitation:            wash_san
    P2_Basic_hygiene:                        wash_hyg
    P2_Lower_secondary_out_of_school:        edu_lsos
    P2_Lower_secondary_completion_rate:      edu_lscr
    P2_Learning_poverty:                     edu_lpov
    P2_Child_labor:                          pro_lab
    P2_Child_marriage:                       pro_mar
    P2_Child_poverty:                        pov_md
    P2_Under_five_covered_by_social_protection: pov_u5sp
    P2_Under_five_mortality:                 sur_u5mor

  # P1 component column renames (group means → short codes)
  p1_component_renames:
    river_flood_gmean:    P1_rfl
    coastal_flood_gmean:  P1_cfl
    storm_gmean:          P1_ts
    drought_gmean:        P1_dr
    heatwave_gmean:       P1_hw
    extreme_heat_gmean:   P1_ext
    fire_gmean:           P1_fr
    sand_dust_gmean:      P1_sds
    air_pollution_gmean:  P1_pm25
    malaria_gmean:        P1_mal

  # P2 component column renames (domain averages → short codes)
  p2_component_renames:
    health:     P2_hea
    nutrition:  P2_nut
    wash:       P2_wash
    education:  P2_edu
    protection: P2_pro
    poverty:    P2_pov
    survival:   P2_sur

